<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HA Wall Panel</title>
<style>

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: #0b0d10;
    color: #fff;
    font-family: Arial, sans-serif;
    padding: 12px;
    overflow: hidden;
    height: 100vh;
}

/* ---- HEADER ---- */
header {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-pack: justify;
    -webkit-justify-content: space-between;
    justify-content: space-between;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1a2030;
}

.header-left {
    font-size: 14px;
    color: #aaa;
}

.header-right {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    gap: 6px;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
}

#grid-label {
    font-size: 11px;
    color: #444;
}

/* ---- BUTTONS ---- */
.btn {
    background: #111622;
    border: 1px solid #1f293d;
    color: #aaa;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 11px;
    cursor: pointer;
}

.btn.locked {
    border-color: #10b981;
    color: #10b981;
}

/* ---- PRESET BAR ---- */
#preset-bar {
    display: none;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
}

#preset-bar.visible {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
}

.preset-label {
    font-size: 11px;
    color: #444;
    margin-right: 2px;
}

.preset-btn {
    background: #111622;
    border: 1px solid #1f293d;
    color: #555;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
}

.preset-btn.selected {
    border-color: #10b981;
    color: #10b981;
}

/* ---- GRID ---- */
#grid {
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-grid;
    display: grid;
    gap: 8px;
    width: 100%;
    /* height set by JS to fill remaining space */
    -webkit-align-content: start;
    align-content: start;
}

/* ---- SLOT ---- */
.slot {
    border-radius: 12px;
    border: 1px dashed #181e2a;
    background: #0d1117;
    /* height set by JS */
    position: relative;
    -webkit-transition: border-color .12s, background .12s;
    transition: border-color .12s, background .12s;
}

.slot.drag-over {
    border-color: #10b981;
    background: #0b1a13;
}

/* ---- CARD ---- */
.card {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #111622;
    border-radius: 12px;
    border: 1px solid #1f293d;
    padding: 10px;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-flex-direction: column;
    flex-direction: column;
    cursor: pointer;
    -webkit-transition: border-color .12s, opacity .12s;
    transition: border-color .12s, opacity .12s;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
}

.card.on {
    border-color: #10b981;
    -webkit-box-shadow: 0 0 10px rgba(16,185,129,.18);
    box-shadow: 0 0 10px rgba(16,185,129,.18);
}

.card.draggable {
    cursor: -webkit-grab;
    cursor: grab;
    border-style: dashed;
    opacity: 0.85;
}

.card.dragging {
    opacity: 0.4;
}

/* ---- CARD INTERNALS ---- */
.dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #2a2a2a;
    margin-bottom: 8px;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
}

.card.on .dot {
    background: #10b981;
}

.card-name {
    font-size: 11px;
    color: #ccc;
    margin-bottom: 3px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    -webkit-flex: 1;
    flex: 1;
}

.card-state {
    font-size: 10px;
    color: #444;
}

.card.on .card-state {
    color: #10b981;
}

/* ---- EMPTY SLOT INDICATOR ---- */
.slot-empty {
    position: absolute;
    top: 50%; left: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: #1a2030;
    pointer-events: none;
}

</style>
</head>
<body>

<header>
    <div class="header-left">Home Assistant Panel</div>
    <div class="header-right">
        <span id="grid-label">4×4</span>
        <button class="btn" id="editBtn" onclick="toggleEdit()">Edit Layout</button>
    </div>
</header>

<div id="preset-bar">
    <span class="preset-label">Grid:</span>
    <button class="preset-btn" onclick="setGrid(2,3)">2×3</button>
    <button class="preset-btn" onclick="setGrid(3,3)">3×3</button>
    <button class="preset-btn selected" onclick="setGrid(4,4)">4×4</button>
    <button class="preset-btn" onclick="setGrid(5,4)">5×4</button>
    <button class="preset-btn" onclick="setGrid(5,5)">5×5</button>
    <button class="preset-btn" onclick="setGrid(6,4)">6×4</button>
    <button class="preset-btn" onclick="setGrid(6,5)">6×5</button>
</div>

<div id="grid"></div>

<!-- load your config file which must expose window.HA_CONFIG = { url: "...", token: "..." } -->
<script src="config.js"></script>

<script>

/* ============================================================
   CONFIG
============================================================ */
var HA_URL   = (typeof HA_CONFIG !== "undefined") ? HA_CONFIG.url   : "";
var HA_TOKEN = (typeof HA_CONFIG !== "undefined") ? HA_CONFIG.token : "";

/* ============================================================
   STATE
============================================================ */
var COLS = 4;
var ROWS = 4;
var editMode = false;
var dragSrcSlot = null;

/*
  layout[] — one entry per grid slot (COLS * ROWS total).
  Each value is either:
    null          → empty slot
    entity_id str → which entity sits here
*/
var layout = [];

/*
  entities{} — keyed by entity_id
    { id, name, state, domain }
*/
var entities = {};

/* ============================================================
   BOOT
============================================================ */
window.onload = function () {
    loadEntities();
    setInterval(syncStates, 5000);
};

/* ============================================================
   LAYOUT HELPERS
============================================================ */
function initLayout(entityIds) {
    var total = COLS * ROWS;
    layout = [];
    for (var i = 0; i < total; i++) {
        layout.push(i < entityIds.length ? entityIds[i] : null);
    }
}

function saveLayout() {
    try {
        localStorage.setItem("ha_layout_" + COLS + "x" + ROWS, JSON.stringify(layout));
        localStorage.setItem("ha_grid", JSON.stringify({ cols: COLS, rows: ROWS }));
    } catch(e) {}
}

function loadSavedLayout() {
    try {
        var g = localStorage.getItem("ha_grid");
        if (g) {
            var parsed = JSON.parse(g);
            COLS = parsed.cols || 4;
            ROWS = parsed.rows || 4;
            document.getElementById("grid-label").textContent = COLS + "×" + ROWS;
            updatePresetButtons();
        }
        var l = localStorage.getItem("ha_layout_" + COLS + "x" + ROWS);
        if (l) {
            layout = JSON.parse(l);
            return true;
        }
    } catch(e) {}
    return false;
}

/* ============================================================
   ENTITY LOAD
============================================================ */
function loadEntities() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", HA_URL + "/api/states", true);
    xhr.setRequestHeader("Authorization", "Bearer " + HA_TOKEN);

    xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4) return;
        if (xhr.status !== 200) {
            console.error("HA load error:", xhr.status);
            return;
        }

        var data = JSON.parse(xhr.responseText);
        var ordered = [];

        for (var i = 0; i < data.length; i++) {
            var e = data[i];
            var domain = e.entity_id.split(".")[0];
            if (domain === "light" || domain === "switch" || domain === "input_boolean") {
                entities[e.entity_id] = {
                    id:     e.entity_id,
                    name:   e.attributes.friendly_name || e.entity_id,
                    state:  e.state,
                    domain: domain
                };
                ordered.push(e.entity_id);
            }
        }

        var hadSaved = loadSavedLayout();
        if (!hadSaved) {
            initLayout(ordered);
        } else {
            /* ensure any new entities get appended to empty slots */
            var inLayout = {};
            for (var j = 0; j < layout.length; j++) {
                if (layout[j]) inLayout[layout[j]] = true;
            }
            for (var k = 0; k < ordered.length; k++) {
                if (!inLayout[ordered[k]]) {
                    /* find first empty slot */
                    for (var s = 0; s < layout.length; s++) {
                        if (!layout[s]) { layout[s] = ordered[k]; break; }
                    }
                }
            }
        }

        render();
    };

    xhr.send();
}

/* ============================================================
   SYNC STATES
============================================================ */
function syncStates() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", HA_URL + "/api/states", true);
    xhr.setRequestHeader("Authorization", "Bearer " + HA_TOKEN);

    xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4 || xhr.status !== 200) return;
        var data = JSON.parse(xhr.responseText);
        for (var i = 0; i < data.length; i++) {
            if (entities[data[i].entity_id]) {
                entities[data[i].entity_id].state = data[i].state;
            }
        }
        updateUI();
    };

    xhr.send();
}

/* ============================================================
   RENDER — full rebuild
============================================================ */
function render() {
    var gridEl = document.getElementById("grid");

    /* column template */
    gridEl.style.gridTemplateColumns = "repeat(" + COLS + ", 1fr)";

    /* compute slot height to fill available space */
    var headerH  = document.querySelector("header").offsetHeight;
    var presetH  = editMode ? (document.getElementById("preset-bar").offsetHeight + 8) : 0;
    var bodyPad  = 24; /* 12px top + 12px bottom */
    var gapTotal = (ROWS - 1) * 8;
    var available = window.innerHeight - headerH - presetH - bodyPad - 16;
    var slotH = Math.floor((available - gapTotal) / ROWS);
    slotH = Math.max(slotH, 70);

    gridEl.innerHTML = "";
    var frag = document.createDocumentFragment();
    var total = COLS * ROWS;

    for (var i = 0; i < total; i++) {
        var slotEl = document.createElement("div");
        slotEl.className = "slot";
        slotEl.style.height = slotH + "px";
        slotEl.setAttribute("data-slot", i);

        var eid = layout[i];

        if (eid && entities[eid]) {
            var e = entities[eid];
            var isOn = e.state === "on";

            var card = document.createElement("div");
            card.className = "card" + (isOn ? " on" : "") + (editMode ? " draggable" : "");
            card.setAttribute("data-entity", eid);

            card.innerHTML =
                '<div class="dot"></div>' +
                '<div class="card-name">' + e.name + '</div>' +
                '<div class="card-state">' + (isOn ? "ON" : "OFF") + '</div>';

            if (editMode) {
                card.setAttribute("draggable", "true");
                card.addEventListener("dragstart", onDragStart);
                card.addEventListener("dragend",   onDragEnd);
            } else {
                card.addEventListener("click", onCardClick);
            }

            slotEl.appendChild(card);
        } else {
            /* empty slot */
            if (editMode) {
                var plus = document.createElement("div");
                plus.className = "slot-empty";
                plus.textContent = "+";
                slotEl.appendChild(plus);
            }
        }

        if (editMode) {
            slotEl.addEventListener("dragover",  onDragOver);
            slotEl.addEventListener("dragleave", onDragLeave);
            slotEl.addEventListener("drop",      onDrop);
        }

        frag.appendChild(slotEl);
    }

    gridEl.appendChild(frag);
}

/* ============================================================
   PATCH UI (no full rebuild — just state changes)
============================================================ */
function updateUI() {
    var slots = document.querySelectorAll(".slot");
    for (var i = 0; i < slots.length; i++) {
        var card = slots[i].querySelector(".card");
        if (!card) continue;
        var eid = card.getAttribute("data-entity");
        if (!entities[eid]) continue;
        var isOn = entities[eid].state === "on";
        if (isOn) {
            card.classList.add("on");
        } else {
            card.classList.remove("on");
        }
        var stateEl = card.querySelector(".card-state");
        if (stateEl) stateEl.textContent = isOn ? "ON" : "OFF";
    }
}

/* ============================================================
   TOGGLE ENTITY
============================================================ */
function onCardClick(ev) {
    var card = ev.currentTarget;
    var eid  = card.getAttribute("data-entity");
    if (!entities[eid]) return;

    var isOn = entities[eid].state === "on";
    entities[eid].state = isOn ? "off" : "on";

    /* optimistic UI */
    if (isOn) {
        card.classList.remove("on");
        card.querySelector(".card-state").textContent = "OFF";
    } else {
        card.classList.add("on");
        card.querySelector(".card-state").textContent = "ON";
    }

    var domain = entities[eid].domain;
    var xhr = new XMLHttpRequest();
    xhr.open("POST", HA_URL + "/api/services/" + domain + "/toggle", true);
    xhr.setRequestHeader("Authorization", "Bearer " + HA_TOKEN);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.send(JSON.stringify({ entity_id: eid }));
}

/* ============================================================
   DRAG AND DROP
============================================================ */
function onDragStart(ev) {
    var slotEl = ev.currentTarget.closest(".slot");
    dragSrcSlot = parseInt(slotEl.getAttribute("data-slot"));
    ev.currentTarget.classList.add("dragging");
    ev.dataTransfer.effectAllowed = "move";
    /* required for Firefox */
    ev.dataTransfer.setData("text/plain", dragSrcSlot);
}

function onDragEnd(ev) {
    ev.currentTarget.classList.remove("dragging");
    /* clear any leftover drag-over highlights */
    var slots = document.querySelectorAll(".slot.drag-over");
    for (var i = 0; i < slots.length; i++) {
        slots[i].classList.remove("drag-over");
    }
}

function onDragOver(ev) {
    ev.preventDefault();
    ev.dataTransfer.dropEffect = "move";
    this.classList.add("drag-over");
}

function onDragLeave() {
    this.classList.remove("drag-over");
}

function onDrop(ev) {
    ev.preventDefault();
    this.classList.remove("drag-over");

    var destSlot = parseInt(this.getAttribute("data-slot"));
    if (dragSrcSlot === null || dragSrcSlot === destSlot) return;

    /* swap */
    var temp          = layout[destSlot];
    layout[destSlot]  = layout[dragSrcSlot];
    layout[dragSrcSlot] = temp;

    dragSrcSlot = null;
    saveLayout();
    render();
}

/* ============================================================
   EDIT MODE TOGGLE
============================================================ */
function toggleEdit() {
    editMode = !editMode;

    var btn = document.getElementById("editBtn");
    btn.textContent = editMode ? "Lock Layout" : "Edit Layout";
    if (editMode) {
        btn.classList.add("locked");
    } else {
        btn.classList.remove("locked");
        saveLayout();
    }

    var bar = document.getElementById("preset-bar");
    if (editMode) {
        bar.classList.add("visible");
    } else {
        bar.classList.remove("visible");
    }

    render();
}

/* ============================================================
   GRID PRESET
============================================================ */
function setGrid(cols, rows) {
    COLS = cols;
    ROWS = rows;
    document.getElementById("grid-label").textContent = cols + "×" + rows;
    updatePresetButtons();

    /* try to restore saved layout for this grid size */
    var had = false;
    try {
        var l = localStorage.getItem("ha_layout_" + COLS + "x" + ROWS);
        if (l) { layout = JSON.parse(l); had = true; }
    } catch(e) {}

    if (!had) {
        /* build fresh layout from currently known entities */
        var ids = Object.keys(entities);
        initLayout(ids);
    }

    render();
}

function updatePresetButtons() {
    var btns = document.querySelectorAll(".preset-btn");
    var target = COLS + "×" + ROWS;
    for (var i = 0; i < btns.length; i++) {
        if (btns[i].textContent === target) {
            btns[i].classList.add("selected");
        } else {
            btns[i].classList.remove("selected");
        }
    }
}

/* recompute slot heights on resize */
window.addEventListener("resize", function () {
    render();
});

</script>
</body>
</html>
