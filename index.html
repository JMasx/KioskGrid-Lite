<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HA Wall Panel</title>

<style>
body {
    margin: 0;
    padding: 18px;
    background: #0b0d10;
    color: #fff;
    font-family: Arial;
    overflow: hidden;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 18px;
    border-bottom: 1px solid #222;
    padding-bottom: 10px;
}

button {
    background: #111622;
    border: 1px solid #1f293d;
    color: white;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
}

/* GRID */
.grid {
    position: relative;
    width: 100%;
    height: calc(100vh - 70px);
}

/* FIXED GRID SIZING SYSTEM */
.item {
    position: absolute;

    /* GRID SIZE CONTROL HERE */
    width: calc((100% / 4) - 14px);   /* 4 columns default */
    height: 110px;

    padding: 6px;
    box-sizing: border-box;
}

/* CARD */
.item-content {
    width: 100%;
    height: 100%;
    background: #111622;
    border-radius: 14px;
    border: 1px solid #1f293d;
    padding: 10px;
    cursor: pointer;

    opacity: 0.6;
    transition: 0.15s ease;

    display: flex;
    flex-direction: column;
}

.item-content.active {
    opacity: 1;
    border-color: #10b981;
    box-shadow: 0 0 10px rgba(16,185,129,0.2);
}

/* spacing inside card */
.top-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #444;
    margin-bottom: 8px;
}

.item-content.active .top-dot {
    background: #10b981;
}

.title {
    font-size: 12px;
    margin-bottom: 4px;
}

.state {
    font-size: 10px;
    color: #888;
}

/* drag visual */
.muuri-item-dragging {
    z-index: 999;
    transform: scale(1.03);
}
</style>
</head>

<body>

<header>
    <div>Home Assistant Panel</div>
    <button onclick="toggleEdit()" id="editBtn">Edit Layout</button>
</header>

<div class="grid" id="grid"></div>

<script src="muuri.min.js"></script>
<script src="config.js"></script>

<script>

var HA_URL = HA_CONFIG.url;
var HA_TOKEN = HA_CONFIG.token;

var grid;
var editMode = false;

var STATE_MAP = {};
var ENTITY_LIST = [];

/* ========================= */
window.onload = function () {
    loadEntities();
    setInterval(syncStates, 4000);
};

/* =========================
   EDIT MODE TOGGLE
========================= */
function toggleEdit() {

    editMode = !editMode;

    document.getElementById("editBtn").innerHTML =
        editMode ? "Lock Layout" : "Edit Layout";

    if (grid) {
        grid.destroy();
        initGrid(editMode);
    }
}

/* =========================
   GRID INIT (LOCKED OR UNLOCKED)
========================= */
function initGrid(enableDrag) {

    grid = new Muuri("#grid", {
        dragEnabled: enableDrag,
        layoutOnInit: true,
        dragSortInterval: 50
    });

    grid.refreshItems().layout();
}

/* =========================
   LOAD ENTITIES
========================= */
function loadEntities() {

    var xhr = new XMLHttpRequest();
    xhr.open("GET", HA_URL + "/api/states", true);
    xhr.setRequestHeader("Authorization", "Bearer " + HA_TOKEN);

    xhr.onreadystatechange = function () {

        if (xhr.readyState !== 4) return;

        if (xhr.status !== 200) {
            console.log("HA ERROR:", xhr.status);
            return;
        }

        var data = JSON.parse(xhr.responseText);

        ENTITY_LIST = [];

        for (var i = 0; i < data.length; i++) {

            var e = data[i];
            var d = e.entity_id.split(".")[0];

            if (d === "light" || d === "switch" || d === "input_boolean") {
                ENTITY_LIST.push(e);
                STATE_MAP[e.entity_id] = e.state;
            }
        }

        render();
    };

    xhr.send();
}

/* =========================
   RENDER GRID
========================= */
function render() {

    var gridEl = document.getElementById("grid");
    gridEl.innerHTML = "";

    var frag = document.createDocumentFragment();

    for (var i = 0; i < ENTITY_LIST.length; i++) {

        var e = ENTITY_LIST[i];
        var state = STATE_MAP[e.entity_id] || "unknown";

        var item = document.createElement("div");
        item.className = "item";
        item.setAttribute("data-entity", e.entity_id);

        item.innerHTML =
            '<div class="item-content ' + (state === "on" ? "active" : "") + '" onclick="toggleEntity(\'' + e.entity_id + '\', this)">' +
                '<div class="top-dot"></div>' +
                '<div class="title">' + (e.attributes.friendly_name || e.entity_id) + '</div>' +
                '<div class="state">' + state.toUpperCase() + '</div>' +
            '</div>';

        frag.appendChild(item);
    }

    gridEl.appendChild(frag);

    initGrid(editMode);
}

/* =========================
   TOGGLE
========================= */
function toggleEntity(entity, el) {

    var label = el.querySelector(".state");
    var isOn = el.classList.contains("active");

    if (isOn) {
        el.classList.remove("active");
        label.innerHTML = "OFF";
    } else {
        el.classList.add("active");
        label.innerHTML = "ON";
    }

    var domain = entity.split(".")[0];

    var xhr = new XMLHttpRequest();
    xhr.open("POST", HA_URL + "/api/services/" + domain + "/toggle", true);

    xhr.setRequestHeader("Authorization", "Bearer " + HA_TOKEN);
    xhr.setRequestHeader("Content-Type", "application/json");

    xhr.send(JSON.stringify({ entity_id: entity }));
}

/* =========================
   SYNC
========================= */
function syncStates() {

    var xhr = new XMLHttpRequest();
    xhr.open("GET", HA_URL + "/api/states", true);
    xhr.setRequestHeader("Authorization", "Bearer " + HA_TOKEN);

    xhr.onreadystatechange = function () {

        if (xhr.readyState !== 4 || xhr.status !== 200) return;

        var data = JSON.parse(xhr.responseText);

        for (var i = 0; i < data.length; i++) {
            STATE_MAP[data[i].entity_id] = data[i].state;
        }

        updateUI();
    };

    xhr.send();
}

/* =========================
   UI PATCH
========================= */
function updateUI() {

    var items = document.querySelectorAll(".item");

    for (var i = 0; i < items.length; i++) {

        var el = items[i];
        var entity = el.getAttribute("data-entity");
        var state = STATE_MAP[entity];

        if (!state) continue;

        var content = el.querySelector(".item-content");
        var label = el.querySelector(".state");

        if (state === "on") {
            content.classList.add("active");
        } else {
            content.classList.remove("active");
        }

        label.innerHTML = state.toUpperCase();
    }
}

</script>

</body>
</html>
