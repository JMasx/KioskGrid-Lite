<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Panel</title>
<style>

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: #0b0d10;
    color: #fff;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    padding: 12px;
}

/* ---- HEADER ---- */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 36px;
    margin-bottom: 10px;
}

.header-left {
    font-size: 13px;
    color: #3a4560;
    white-space: nowrap;
    margin-right: 10px;
    flex-shrink: 0;
}

/* grid selector — slides in from right, lives in header row */
.grid-selector {
    display: flex;
    gap: 5px;
    align-items: center;
    overflow: hidden;
    max-width: 0;
    opacity: 0;
    transition: max-width 0.2s ease, opacity 0.15s ease;
    flex-shrink: 1;
    margin-right: 0;
}

.grid-selector.open {
    max-width: 400px;
    opacity: 1;
    margin-right: 8px;
}

.gbtn {
    background: #111622;
    border: 1px solid #1f293d;
    color: #555;
    padding: 4px 9px;
    border-radius: 6px;
    font-size: 10px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
}

.gbtn.sel {
    border-color: #10b981;
    color: #10b981;
}

/* right side buttons */
.header-right {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
}

.hbtn {
    background: #111622;
    border: 1px solid #1f293d;
    color: #555;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
}

.hbtn.active {
    border-color: #10b981;
    color: #10b981;
}

/* ---- GRID ---- */
#grid {
    display: grid;
    gap: 8px;
}

/* ---- SLOT ---- */
.slot {
    border-radius: 12px;
    position: relative;
}

.slot.drag-over {
    background: #0a1a12;
}

/* ---- CARD ---- */
.card {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #111622;
    border-radius: 12px;
    border: 1px solid #1f293d;
    padding: 10px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
}

.card.on {
    border-color: #10b981;
}

.card.draggable {
    cursor: grab;
    border-style: dashed;
}

.card.dragging {
    opacity: 0.35;
}

.dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #252d3e;
    margin-bottom: 8px;
    flex-shrink: 0;
}

.card.on .dot {
    background: #10b981;
}

.card-name {
    font-size: 11px;
    color: #8090b0;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    flex: 1;
    margin-bottom: 3px;
}

.card.on .card-name {
    color: #ccc;
}

.card-state {
    font-size: 10px;
    color: #2a3348;
}

.card.on .card-state {
    color: #10b981;
}

.empty-plus {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 16px;
    color: #1a2030;
    pointer-events: none;
}

</style>
</head>
<body>

<header>
    <div class="header-left">KioskGrid Lite</div>

    <!-- grid preset row — slides open in edit mode -->
    <div class="grid-selector" id="gridSelector">
        <button class="gbtn" onclick="setGrid(2,3)">2x3</button>
        <button class="gbtn" onclick="setGrid(3,3)">3x3</button>
        <button class="gbtn sel" onclick="setGrid(4,4)">4x4</button>
        <button class="gbtn" onclick="setGrid(5,4)">5x4</button>
        <button class="gbtn" onclick="setGrid(5,5)">5x5</button>
        <button class="gbtn" onclick="setGrid(6,4)">6x4</button>
        <button class="gbtn" onclick="setGrid(6,5)">6x5</button>
    </div>

    <div class="header-right">
        <button class="hbtn" id="editBtn" onclick="toggleEdit()">Edit Layout</button>
    </div>
</header>

<div id="grid"></div>

<script src="config.js"></script>
<script>

var HA_URL   = (typeof HA_CONFIG !== "undefined") ? HA_CONFIG.url   : "";
var HA_TOKEN = (typeof HA_CONFIG !== "undefined") ? HA_CONFIG.token : "";

var COLS = 4, ROWS = 4;
var editMode = false;
var dragSrcSlot = null;
var layout = [];
var entities = {};

/* ---- BOOT ---- */
window.onload = function () {
    loadEntities();
    setInterval(syncStates, 5000);
};

/* ---- LAYOUT HELPERS ---- */
function initLayout(ids) {
    var total = COLS * ROWS;
    layout = [];
    for (var i = 0; i < total; i++) {
        layout.push(i < ids.length ? ids[i] : null);
    }
}

function saveLayout() {
    try {
        localStorage.setItem("ha_layout_" + COLS + "x" + ROWS, JSON.stringify(layout));
        localStorage.setItem("ha_grid", JSON.stringify({ cols: COLS, rows: ROWS }));
    } catch(e) {}
}

function loadSavedLayout() {
    try {
        var g = localStorage.getItem("ha_grid");
        if (g) {
            var p = JSON.parse(g);
            COLS = p.cols || 4;
            ROWS = p.rows || 4;
            gridButtonUpdater();
        }
        var l = localStorage.getItem("ha_layout_" + COLS + "x" + ROWS);
        if (l) { layout = JSON.parse(l); return true; }
    } catch(e) {}
    return false;
}

/* ---- LOAD ENTITIES ---- */
function loadEntities() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", HA_URL + "/api/states", true);
    xhr.setRequestHeader("Authorization", "Bearer " + HA_TOKEN);
    xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4 || xhr.status !== 200) return;
        var data = JSON.parse(xhr.responseText);
        var ordered = [];
        for (var i = 0; i < data.length; i++) {
            var e = data[i];
            var d = e.entity_id.split(".")[0];
            if (d === "light" || d === "switch" || d === "input_boolean") {
                entities[e.entity_id] = {
                    id: e.entity_id,
                    name: e.attributes.friendly_name || e.entity_id,
                    state: e.state,
                    domain: d
                };
                ordered.push(e.entity_id);
            }
        }
        var had = loadSavedLayout();
        if (!had) {
            initLayout(ordered);
        } else {
            var inL = {};
            for (var j = 0; j < layout.length; j++) { if (layout[j]) inL[layout[j]] = true; }
            for (var k = 0; k < ordered.length; k++) {
                if (!inL[ordered[k]]) {
                    for (var s = 0; s < layout.length; s++) {
                        if (!layout[s]) { layout[s] = ordered[k]; break; }
                    }
                }
            }
        }
        render();
    };
    xhr.send();
}

/* ---- SYNC ---- */
function syncStates() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", HA_URL + "/api/states", true);
    xhr.setRequestHeader("Authorization", "Bearer " + HA_TOKEN);
    xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4 || xhr.status !== 200) return;
        var data = JSON.parse(xhr.responseText);
        for (var i = 0; i < data.length; i++) {
            if (entities[data[i].entity_id]) {
                entities[data[i].entity_id].state = data[i].state;
            }
        }
        updateUI();
    };
    xhr.send();
}

/* ---- RENDER ---- */
function render() {
    var gridEl = document.getElementById("grid");
    gridEl.style.gridTemplateColumns = "repeat(" + COLS + ", 1fr)";

    var headerH  = 36 + 10 + 10; /* header height + top padding + margin-bottom */
    var gapTotal = (ROWS - 1) * 8;
    var available = window.innerHeight - headerH;
    var slotH = Math.floor((available - gapTotal) / ROWS);
    if (slotH < 60) slotH = 60;

    gridEl.innerHTML = "";
    var frag = document.createDocumentFragment();
    var total = COLS * ROWS;

    for (var i = 0; i < total; i++) {
        var slotEl = document.createElement("div");
        slotEl.className = "slot";
        slotEl.style.height = slotH + "px";
        slotEl.setAttribute("data-slot", i);

        var eid = layout[i];

        if (eid && entities[eid]) {
            var e    = entities[eid];
            var isOn = e.state === "on";

            var card = document.createElement("div");
            card.className = "card" + (isOn ? " on" : "") + (editMode ? " draggable" : "");
            card.setAttribute("data-entity", eid);

            card.innerHTML =
                '<div class="dot"></div>' +
                '<div class="card-name">' + e.name + '</div>' +
                '<div class="card-state">' + (isOn ? "ON" : "OFF") + '</div>';

            if (editMode) {
                card.setAttribute("draggable", "true");
                card.addEventListener("dragstart", onDragStart);
                card.addEventListener("dragend",   onDragEnd);
            } else {
                card.addEventListener("click", onCardClick);
            }

            slotEl.appendChild(card);
        } else if (editMode) {
            var plus = document.createElement("div");
            plus.className = "empty-plus";
            plus.textContent = "+";
            slotEl.appendChild(plus);
        }

        if (editMode) {
            slotEl.addEventListener("dragover",  onDragOver);
            slotEl.addEventListener("dragleave", onDragLeave);
            slotEl.addEventListener("drop",      onDrop);
        }

        frag.appendChild(slotEl);
    }

    gridEl.appendChild(frag);
}

/* ---- PATCH UI — no rebuild ---- */
function updateUI() {
    var slots = document.querySelectorAll(".slot");
    for (var i = 0; i < slots.length; i++) {
        var card = slots[i].querySelector(".card");
        if (!card) continue;
        var eid = card.getAttribute("data-entity");
        if (!entities[eid]) continue;
        var isOn = entities[eid].state === "on";
        if (isOn) { card.classList.add("on"); } else { card.classList.remove("on"); }
        var st = card.querySelector(".card-state");
        if (st) st.textContent = isOn ? "ON" : "OFF";
    }
}

/* ---- TOGGLE ENTITY ---- */
function onCardClick(ev) {
    var card = ev.currentTarget;
    var eid  = card.getAttribute("data-entity");
    if (!entities[eid]) return;
    var isOn = entities[eid].state === "on";
    entities[eid].state = isOn ? "off" : "on";
    if (isOn) { card.classList.remove("on"); } else { card.classList.add("on"); }
    var st = card.querySelector(".card-state");
    if (st) st.textContent = isOn ? "OFF" : "ON";
    var xhr = new XMLHttpRequest();
    xhr.open("POST", HA_URL + "/api/services/" + entities[eid].domain + "/toggle", true);
    xhr.setRequestHeader("Authorization", "Bearer " + HA_TOKEN);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.send(JSON.stringify({ entity_id: eid }));
}

/* ---- EDIT MODE ---- */
function toggleEdit() {
    editMode = !editMode;
    var btn = document.getElementById("editBtn");
    var sel = document.getElementById("gridSelector");
    if (editMode) {
        btn.textContent = "Lock Layout";
        btn.classList.add("active");
        sel.classList.add("open");
    } else {
        btn.textContent = "Edit Layout";
        btn.classList.remove("active");
        sel.classList.remove("open");
        saveLayout();
    }
    render();
}

/* ---- DRAG ---- */
function onDragStart(ev) {
    dragSrcSlot = parseInt(ev.currentTarget.closest(".slot").getAttribute("data-slot"));
    ev.currentTarget.classList.add("dragging");
    ev.dataTransfer.effectAllowed = "move";
    ev.dataTransfer.setData("text/plain", dragSrcSlot);
}

function onDragEnd(ev) {
    ev.currentTarget.classList.remove("dragging");
    var all = document.querySelectorAll(".slot.drag-over");
    for (var i = 0; i < all.length; i++) all[i].classList.remove("drag-over");
}

function onDragOver(ev) {
    ev.preventDefault();
    ev.dataTransfer.dropEffect = "move";
    this.classList.add("drag-over");
}

function onDragLeave() {
    this.classList.remove("drag-over");
}

function onDrop(ev) {
    ev.preventDefault();
    this.classList.remove("drag-over");
    var dest = parseInt(this.getAttribute("data-slot"));
    if (dragSrcSlot === null || dragSrcSlot === dest) return;
    var tmp = layout[dest];
    layout[dest] = layout[dragSrcSlot];
    layout[dragSrcSlot] = tmp;
    dragSrcSlot = null;
    saveLayout();
    render();
}

/* ---- GRID PRESET ---- */
function setGrid(cols, rows) {
    COLS = cols; ROWS = rows;
    gridButtonUpdater();
    var had = false;
    try {
        var l = localStorage.getItem("ha_layout_" + COLS + "x" + ROWS);
        if (l) { layout = JSON.parse(l); had = true; }
    } catch(e) {}
    if (!had) { initLayout(Object.keys(entities)); }
    render();
}

function gridButtonUpdater() {
    var target = COLS + "x" + ROWS;
    var btns = document.querySelectorAll(".gbtn");
    for (var i = 0; i < btns.length; i++) {
        if (btns[i].textContent === target) {
            btns[i].classList.add("sel");
        } else {
            btns[i].classList.remove("sel");
        }
    }
}

window.addEventListener("resize", function () { render(); });

</script>
</body>
</html>
